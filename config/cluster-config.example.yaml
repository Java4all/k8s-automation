# Kubernetes Cluster Configuration
# This file defines all parameters for k8s cluster deployment

cluster:
  name: "production-k8s"
  environment: "prod"  # dev, staging, prod
  k8s_version: "1.34"
  
  # Control Plane Configuration
  control_plane:
    endpoint_vip: "172.23.60.153"  # F5 VIP pointing to masters
    endpoint_port: 6443

  # Network Configuration
  networking:
    pod_cidr: "10.0.68.0/21"        # Pod network CIDR
    service_cidr: "10.0.76.0/22"    # Service network CIDR (optional, defaults to 10.0.0.0/24)
    dns_servers:
      - "8.8.8.8"
      - "8.8.4.4"
    ntp_servers:
      - "0.ubuntu.pool.ntp.org"
      - "1.ubuntu.pool.ntp.org"

  # Proxy Configuration (MANDATORY)
  proxy:
    enabled: true
    http_proxy: "http://10.0.0.254:8080"
    https_proxy: "http://10.0.0.254:8080"
    no_proxy_list:
      - "localhost"
      - "127.0.0.1"
      - "localaddress"
      - ".localdomain.com"
      - ".local"
      - "10.0.0.0/8"
      - "192.168.0.0/16"
      - "172.16.0.0/12"
      - ".cluster"
      - "127.0.0.0/8"

  # Calico Configuration
  calico:
    version: "v3.31.3"
    pool_cidr: "10.0.68.0/21"  # Should match pod_cidr

# Nodes Configuration
nodes:
  # Master Nodes (Control Plane)
  masters:
    - name: "vmm1"
      hostname: "vmm1"
      ip: "10.0.32.10"
      netmask: "255.255.240.0"      # /20
      gateway: "10.0.32.1"
      role: "master"
      
    - name: "vmm2"
      hostname: "vmm2"
      ip: "10.0.32.11"
      netmask: "255.255.240.0"      # /20
      gateway: "10.0.32.1"
      role: "master"
      
    - name: "vmm3"
      hostname: "vmm3"
      ip: "10.0.32.12"
      netmask: "255.255.240.0"      # /20
      gateway: "10.0.32.1"
      role: "master"

  # Worker Nodes
  workers:
    - name: "vmw1"
      hostname: "vmw1"
      ip: "10.0.32.2"
      netmask: "255.255.240.0"      # /20
      gateway: "10.0.32.1"
      role: "worker"
      
    - name: "vmw2"
      hostname: "vmw2"
      ip: "10.0.32.3"
      netmask: "255.255.240.0"      # /20
      gateway: "10.0.32.1"
      role: "worker"
      
    - name: "vmw3"
      hostname: "vmw3"
      ip: "10.0.32.4"
      netmask: "255.255.240.0"      # /20
      gateway: "10.0.32.1"
      role: "worker"

# System Configuration
system:
  os: "Ubuntu 24.04.3 LTS"
  timezone: "UTC"
  disable_apparmor: true
  disable_swap: true
  
# Container Runtime
container_runtime:
  engine: "containerd"
  docker_enabled: true  # Install docker.io
  systemd_cgroup: true

# SSH/Access Configuration
ssh:
  user: "ubuntu"
  key_path: "/root/.ssh/id_rsa"  # Path on GitLab runner
  port: 22
  timeout: 300
  retries: 3

# Deployment Options
deployment:
  skip_verification: false
  health_check_timeout: 600  # seconds
  calico_wait_timeout: 300   # seconds for calico pods to be ready
  parallel_workers: 3        # number of workers to deploy in parallel
