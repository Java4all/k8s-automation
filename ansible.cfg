[defaults]
# Inventory configuration
inventory = ./inventories/inventory.py
host_key_checking = False
gather_subset = all

# Suppress deprecation warnings
deprecation_warnings = False

# Privilege escalation
become = True
become_method = sudo
become_user = root

# SSH configuration
# Note: ansible_ssh_private_key_file can be specified per-host in inventory or via command line
ssh_args = -C -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
pipelining = True
control_path = /tmp/ansible-ssh-%%h-%%p-%%r
# Default private key (can be overridden by ansible_ssh_private_key_file in inventory)

# Logging
log_path = /tmp/ansible.log
# Uncomment for verbose debugging
# verbosity = 4

# Module and role paths
library = ./library
roles_path = ./roles

# Retry files
retry_files_enabled = False
retry_files_save_path = /tmp/

# Callback plugins
callback_whitelist = profile_tasks, timer, stdout_callback

# Task output
force_color = True
