# Kubernetes Cluster Inventory
# Update IPs and hostnames according to your environment

[all:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=/root/.ssh/id_rsa
ansible_python_interpreter=/usr/bin/python3

[masters]
vmm1 ansible_host=10.0.32.10
vmm2 ansible_host=10.0.32.11
vmm3 ansible_host=10.0.32.12

[workers]
vmw1 ansible_host=10.0.32.2
vmw2 ansible_host=10.0.32.3
vmw3 ansible_host=10.0.32.4

[kubernetes:children]
masters
workers
