---
- name: Install Docker
  block:
    - name: Create docker keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Verify curl is available
      command: which curl
      changed_when: false

    - name: Verify gpg is available
      command: which gpg
      changed_when: false

    - name: Test network connectivity to Docker repository
      shell: |
        curl -I --connect-timeout 5 https://download.docker.com/linux/ubuntu/gpg 2>&1 | head -1
      register: network_test
      changed_when: false
      ignore_errors: true

    - name: Display network test result
      debug:
        msg: "Network connectivity: {{ network_test.stdout }}"

    - name: Add Docker GPG key
      shell: |
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        if [ ! -f /etc/apt/keyrings/docker.gpg ]; then
          echo "ERROR: Failed to create docker.gpg"
          exit 1
        fi
      retries: 3
      delay: 10
      register: gpg_key_result
      check_mode: no

    - name: Set Docker GPG key permissions
      file:
        path: /etc/apt/keyrings/docker.gpg
        mode: '0644'
      when: not ansible_check_mode

    - name: Get system architecture
      command: dpkg --print-architecture
      register: system_arch
      changed_when: false

    - name: Get Ubuntu release codename
      shell: grep UBUNTU_CODENAME /etc/os-release | cut -d= -f2
      register: ubuntu_release
      changed_when: false

    - name: Add Docker repository
      shell: |
        echo "deb [arch={{ system_arch.stdout }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ubuntu_release.stdout }} stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
      register: repo_added
      changed_when: "'deb [arch' in repo_added.stdout"

    - name: Verify Docker GPG key exists
      stat:
        path: /etc/apt/keyrings/docker.gpg
      register: gpg_key_stat
      changed_when: false

    - name: Display Docker GPG key status
      debug:
        msg: |
          Docker GPG key status:
          - Path: /etc/apt/keyrings/docker.gpg
          - Exists: {{ gpg_key_stat.stat.exists }}
          - Size: {{ gpg_key_stat.stat.size | default(0) }} bytes
          - Mode: {{ gpg_key_stat.stat.mode | default('N/A') }}

    - name: Verify Docker repository file exists
      stat:
        path: /etc/apt/sources.list.d/docker.list
      register: repo_file_stat
      changed_when: false

    - name: Display Docker repository file status
      debug:
        msg: |
          Docker repository file status:
          - Path: /etc/apt/sources.list.d/docker.list
          - Exists: {{ repo_file_stat.stat.exists }}
          - Size: {{ repo_file_stat.stat.size | default(0) }} bytes
          - Content check needed if size > 0

    - name: Verify apt sources are accessible
      shell: |
        apt-cache search docker-ce 2>&1 | head -5
      register: apt_search_result
      changed_when: false
      ignore_errors: true

    - name: Display apt search result
      debug:
        msg: |
          Docker packages search result:
          {% if "docker-ce" in apt_search_result.stdout %}
          ✓ docker-ce package found in apt cache
          {% else %}
          ✗ docker-ce package NOT found - repository may not be accessible
          Details: {{ apt_search_result.stdout | default('No output') }}
          {% endif %}

    - name: Remove stale Docker repository file if GPG key missing
      file:
        path: /etc/apt/sources.list.d/docker.list
        state: absent
      when: not gpg_key_stat.stat.exists

    - name: Re-add Docker repository if GPG key was missing
      shell: |
        echo "deb [arch={{ system_arch.stdout }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ubuntu_release.stdout }} stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
      when: not gpg_key_stat.stat.exists
      register: repo_re_added

    - name: Update package cache (forced)
      apt:
        update_cache: yes
        cache_valid_time: 0
      when: not ansible_check_mode
      register: cache_update_result

    - name: Display cache update status
      debug:
        msg: |
          Package cache update:
          - Updated: {{ cache_update_result.cache_updated | default('N/A') }}
          - Cache valid time: {{ cache_update_result.cache_update_time | default('N/A') }}

    - name: Install Docker packages (docker-ce)
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
      when: not ansible_check_mode

    - name: Enable and start Docker service
      systemd:
        name: docker
        enabled: yes
        state: started
      when: not ansible_check_mode

    - name: Verify Docker installation
      command: docker --version
      register: docker_version
      changed_when: false
      when: not ansible_check_mode

    - name: Verify Docker Compose installation
      command: docker compose version
      register: compose_version
      changed_when: false
      when: not ansible_check_mode

    - name: Display Docker versions
      debug:
        msg: |
          Docker: {{ docker_version.stdout | default('Not installed in check mode') }}
          Docker Compose: {{ compose_version.stdout | default('Not installed in check mode') }}

- name: Configure Docker proxy settings
  block:
    - name: Create docker service directory
      file:
        path: /etc/systemd/system/docker.service.d
        state: directory
        mode: '0755'

    - name: Create docker proxy config
      template:
        src: docker-proxy.conf.j2
        dest: /etc/systemd/system/docker.service.d/http-proxy.conf
        owner: root
        group: root
        mode: '0644'
      when: cluster.proxy.enabled
      notify: restart docker

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes
  when: not ansible_check_mode

- name: Add docker to startup
  systemd:
    name: docker
    enabled: yes
    state: restarted
  when: not ansible_check_mode
