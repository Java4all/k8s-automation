---
- name: Install Docker
  block:
    - name: Add Docker GPG key
      shell: |
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg
      register: docker_key
      retries: 3
      delay: 10

    - name: Set Docker GPG key permissions
      file:
        path: /etc/apt/keyrings/docker.gpg
        mode: '0644'

    - name: Add Docker repository
      shell: |
        echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Update package cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install docker.io
      apt:
        name: docker.io
        state: present

    - name: Enable docker service
      systemd:
        name: docker
        enabled: yes
        state: started

    - name: Verify docker installation
      command: docker --version
      register: docker_version
      changed_when: false

    - name: Display docker version
      debug:
        msg: "Docker installed: {{ docker_version.stdout }}"

- name: Configure Docker proxy settings
  block:
    - name: Create docker service directory
      file:
        path: /etc/systemd/system/docker.service.d
        state: directory
        mode: '0755'

    - name: Create docker proxy config
      template:
        src: docker-proxy.conf.j2
        dest: /etc/systemd/system/docker.service.d/http-proxy.conf
        owner: root
        group: root
        mode: '0644'
      when: cluster.proxy.enabled
      notify: restart docker

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes

- name: Add docker to startup
  systemd:
    name: docker
    enabled: yes
    state: restarted
