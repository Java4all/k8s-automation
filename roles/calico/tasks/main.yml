---
- name: Install Calico Network Plugin
  block:
    - name: Check if Calico is already installed
      command: kubectl get namespace calico-system
      environment:
        KUBECONFIG: "{{ ansible_env.HOME }}/.kube/config"
      register: calico_ns_check
      ignore_errors: yes
      changed_when: false

    - name: Set calico installation status based on namespace check
      set_fact:
        calico_status:
          stdout: "{% if calico_ns_check.rc == 0 %}installed{% else %}not-installed{% endif %}"
      changed_when: false

    - name: Debug - Show Calico detection result
      debug:
        msg: "Calico detection result: [{{ calico_status.stdout }}] (length: {{ calico_status.stdout | length }})"

    - name: Install Calico Operator
      block:
        - name: Create Calico CRDs
          command: |
            kubectl create -f https://raw.githubusercontent.com/projectcalico/calico/{{ cluster.calico.version }}/manifests/operator-crds.yaml
          environment:
            KUBECONFIG: "{{ ansible_env.HOME }}/.kube/config"
          register: calico_crds
          retries: 3
          delay: 10

        - name: Create Tigera Operator
          command: |
            kubectl create -f https://raw.githubusercontent.com/projectcalico/calico/{{ cluster.calico.version }}/manifests/tigera-operator.yaml
          environment:
            KUBECONFIG: "{{ ansible_env.HOME }}/.kube/config"
          register: tigera_operator
          retries: 3
          delay: 10

        - name: Wait for Tigera Operator to be ready
          shell: |
            kubectl -n tigera-operator wait --for=condition=ready pod -l k8s-app=tigera-operator --timeout=300s
          environment:
            KUBECONFIG: "{{ ansible_env.HOME }}/.kube/config"
          retries: 3
          delay: 10
          ignore_errors: yes

        - name: Download custom resources
          shell: |
            curl -O https://raw.githubusercontent.com/projectcalico/calico/{{ cluster.calico.version }}/manifests/custom-resources.yaml
          args:
            chdir: /tmp
            creates: /tmp/custom-resources.yaml
          retries: 3
          delay: 10

        - name: Update custom resources with pod CIDR
          ansible.builtin.replace:
            path: /tmp/custom-resources.yaml
            regexp: 'cidr:\s*192\.168\.0\.0/16'
            replace: 'cidr: {{ cluster.calico.pool_cidr }}'
            backup: yes

        - name: Apply custom resources
          command: |
            kubectl apply -f /tmp/custom-resources.yaml
          environment:
            KUBECONFIG: "{{ ansible_env.HOME }}/.kube/config"
          register: calico_resources
          retries: 3
          delay: 10

      when: calico_status.stdout != "installed"

    - name: Wait for Calico pods to be running
      block:
        - name: Wait for calico-node pods
          shell: |
            kubectl -n calico-system wait --for=condition=ready pod -l k8s-app=calico-node --timeout={{ deployment.calico_wait_timeout | default(300) }}s
          environment:
            KUBECONFIG: "{{ ansible_env.HOME }}/.kube/config"
          retries: 3
          delay: 10

        - name: Wait for other calico pods
          shell: |
            kubectl -n calico-system wait --for=condition=ready pod --all --timeout={{ deployment.calico_wait_timeout | default(300) }}s
          environment:
            KUBECONFIG: "{{ ansible_env.HOME }}/.kube/config"
          ignore_errors: yes

        - name: Check Calico pod status
          command: |
            kubectl get pods -n calico-system
          environment:
            KUBECONFIG: "{{ ansible_env.HOME }}/.kube/config"
          register: calico_pods
          changed_when: false

        - name: Display Calico pod status
          debug:
            msg: "{{ calico_pods.stdout }}"

- name: Verify cluster networking
  block:
    - name: Check cluster nodes
      command: |
        kubectl get nodes -o wide
      environment:
        KUBECONFIG: "{{ ansible_env.HOME }}/.kube/config"
      register: nodes_status
      changed_when: false

    - name: Display nodes status
      debug:
        msg: "{{ nodes_status.stdout }}"

    - name: Check all pods
      command: |
        kubectl get pods --all-namespaces
      environment:
        KUBECONFIG: "{{ ansible_env.HOME }}/.kube/config"
      register: all_pods
      changed_when: false

    - name: Display all pods
      debug:
        msg: "{{ all_pods.stdout }}"
