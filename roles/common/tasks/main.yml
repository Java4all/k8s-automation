---
- name: Update package cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install minimal required packages
  apt:
    name:
      - curl
      - ca-certificates
      - apt-transport-https
      - gnupg
    state: present

- name: Set timezone to UTC
  shell: timedatectl set-timezone UTC
  changed_when: false

- name: Configure DNS servers
  block:
    - name: Display network configuration mode
      debug:
        msg: |
          Network Configuration Mode: {{ cluster.networking.mode | default('dhcp') | upper }}
          {% if cluster.networking.mode == 'static' %}
          - Using STATIC IP configuration
          - Gateway: {{ cluster.networking.static.gateway | default('10.0.32.1') }}
          - IP will be set to current address with CIDR prefix
          {% else %}
          - Using DHCP configuration
          - IP assigned by DHCP server
          {% if cluster.networking.dhcp.override_dns | default(true) %}
          - DNS override enabled: will use custom DNS servers
          {% else %}
          - DNS override disabled: will use DHCP-provided DNS
          {% endif %}
          {% endif %}
    
    - name: Create netplan config with DNS
      template:
        src: 99-custom-dns.yaml.j2
        dest: /etc/netplan/99-custom-dns.yaml
        mode: '0644'
    
    - name: Apply netplan configuration
      command: netplan apply
      register: netplan_result
      failed_when: netplan_result.rc != 0
  when: cluster.networking.dns.enabled | default(true)

- name: Configure NTP
  block:
    - name: Install chrony
      apt:
        name: chrony
        state: present
    
    - name: Configure chrony servers
      template:
        src: chrony.conf.j2
        dest: /etc/chrony/chrony.conf
        backup: yes
      notify: restart chrony
    
    - name: Enable and start chrony
      systemd:
        name: chrony
        enabled: yes
        state: started
  when: cluster.networking.ntp.enabled | default(true)

- name: Disable nftables
  block:
    - name: Disable nftables service
      systemd:
        name: nftables
        enabled: no
        state: stopped
      ignore_errors: yes

- name: Disable swap
  block:
    - name: Turn off swap
      command: swapoff -a
      when: ansible_facts['swaptotal_mb'] > 0

    - name: Remove swap from fstab
      lineinfile:
        path: /etc/fstab
        regexp: '^\s*[^\s]+\s+none\s+swap'
        state: absent

- name: Load kernel modules
  block:
    - name: Create modules-load.d config for k8s
      copy:
        content: |
          overlay
          br_netfilter
        dest: /etc/modules-load.d/k8s.conf
        owner: root
        group: root
        mode: '0644'
    
    - name: Load overlay module
      modprobe:
        name: overlay
        state: present
    
    - name: Load br_netfilter module
      modprobe:
        name: br_netfilter
        state: present

- name: Configure sysctl for Kubernetes
  block:
    - name: Create kubernetes sysctl config
      copy:
        content: |
          net.bridge.bridge-nf-call-ip6tables = 1
          net.bridge.bridge-nf-call-iptables = 1
          net.ipv4.ip_forward = 1
        dest: /etc/sysctl.d/kubernetes.conf
        owner: root
        group: root
        mode: '0644'
    
    - name: Disable ipv4 forwarding in default sysctl
      ansible.builtin.replace:
        path: /etc/sysctl.d/99-sysctl.conf
        regexp: '^net\.ipv4\.ip_forward\s*='
        replace: '#net.ipv4.ip_forward = 0'
        backup: yes
    
    - name: Apply sysctl settings
      command: sysctl --system

# Note: System upgrade not performed - uses Ubuntu 24.04.3 LTS base only
# Only package installations from standard Ubuntu 24.04.3 LTS repositories

- name: Set hostname
  hostname:
    name: "{{ inventory_hostname }}"
    use: systemd

- name: Configure system-wide proxy settings (if enabled)
  block:
    - name: Create /etc/environment with proxy settings
      template:
        src: environment-proxy.j2
        dest: /etc/environment
        owner: root
        group: root
        mode: '0644'
      when: cluster.proxy.enabled

  tags: [proxy, environment]
