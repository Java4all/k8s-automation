---
- name: Join Worker Node to Kubernetes Cluster
  block:
    ###########################################################################
    # 1. CHECK IF NODE IS ALREADY JOINED
    ###########################################################################
    - name: Check if node is already joined
      stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf

    ###########################################################################
    # 2. JOIN WORKER NODE
    ###########################################################################
    - name: Join to cluster
      block:
        - name: Get join command from first master
          shell: kubeadm token create --print-join-command
          environment:
            KUBECONFIG: /etc/kubernetes/admin.conf
          register: join_command
          delegate_to: "{{ groups['masters'][0] }}"
          become: yes

        - name: Join worker node to cluster
          shell: "{{ join_command.stdout }}"
          register: join_result
          retries: 3
          delay: 10

        - name: Display join result
          debug:
            msg: "{{ join_result.stdout }}"

      when: not kubelet_conf.stat.exists

    ###########################################################################
    # 3. VERIFY NODE HAS JOINED (RUNS ON MASTER)
    ###########################################################################
    - name: Verify node has joined
      block:
        - name: Wait for worker node to register with API server
          shell: |
            kubectl get node {{ inventory_hostname }} --no-headers
          environment:
            KUBECONFIG: /etc/kubernetes/admin.conf
          register: node_registered
          until: node_registered.rc == 0
          retries: 30
          delay: 10
          delegate_to: "{{ groups['masters'][0] }}"

        - name: Wait for node to become Ready
          shell: |
            kubectl get node {{ inventory_hostname }} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
          environment:
            KUBECONFIG: /etc/kubernetes/admin.conf
          register: node_ready
          until: node_ready.stdout == "True"
          retries: 30
          delay: 10
          delegate_to: "{{ groups['masters'][0] }}"

    ###########################################################################
    # 4. LABEL WORKER NODE (AFTER READY)
    ###########################################################################
    - name: Label worker node
      block:
        - name: Label worker node with worker role
          shell: |
            kubectl label node {{ inventory_hostname }} node-role.kubernetes.io/worker=worker --overwrite
          environment:
            KUBECONFIG: /etc/kubernetes/admin.conf
          register: label_result
          delegate_to: "{{ groups['masters'][0] }}"

        - name: Display node labeling result
          debug:
            msg: "Worker {{ inventory_hostname }} labeling: {{ label_result.stdout | default('No output') }}"

    ###########################################################################
    # 5. FINAL STATUS
    ###########################################################################
    - name: Display worker node status
      debug:
        msg: "Worker node {{ inventory_hostname }} has been successfully joined and labeled."
