---
- name: Install Kubernetes packages
  block:
    - name: Update package cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Download Kubernetes GPG key
      shell: |
        curl -fsSL https://pkgs.k8s.io/core:/stable:/v{{ cluster.k8s_version }}/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      args:
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      register: k8s_key_download
      retries: 3
      delay: 10
      check_mode: no

    - name: Set permissions on GPG key
      file:
        path: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
        mode: '0644'
      when: not ansible_check_mode

    - name: Add Kubernetes APT repository
      shell: |
        echo "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ cluster.k8s_version }}/deb/ /" | tee /etc/apt/sources.list.d/kubernetes.list
      register: k8s_repo_added
      changed_when: "'deb [signed' in k8s_repo_added.stdout"

    - name: Set permissions on Kubernetes repo file
      file:
        path: /etc/apt/sources.list.d/kubernetes.list
        mode: '0644'
      when: not ansible_check_mode

    - name: Verify Kubernetes GPG key exists
      stat:
        path: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      register: k8s_gpg_key_stat
      changed_when: false

    - name: Display Kubernetes GPG key status
      debug:
        msg: |
          Kubernetes GPG key status:
          - Path: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
          - Exists: {{ k8s_gpg_key_stat.stat.exists }}
          - Size: {{ k8s_gpg_key_stat.stat.size | default(0) }} bytes

    - name: Remove stale Kubernetes repository file if GPG key missing
      file:
        path: /etc/apt/sources.list.d/kubernetes.list
        state: absent
      when: not k8s_gpg_key_stat.stat.exists

    - name: Re-add Kubernetes repository if GPG key was missing
      shell: |
        echo "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ cluster.k8s_version }}/deb/ /" | tee /etc/apt/sources.list.d/kubernetes.list
      when: not k8s_gpg_key_stat.stat.exists
      register: k8s_repo_re_added

    - name: Update package cache again
      apt:
        update_cache: yes
        cache_valid_time: 0
      when: not ansible_check_mode
      register: k8s_cache_update_result

    - name: Display Kubernetes cache update status
      debug:
        msg: |
          Kubernetes package cache update:
          - Updated: {{ k8s_cache_update_result.cache_updated | default('N/A') }}
          - Cache valid time: {{ k8s_cache_update_result.cache_update_time | default('N/A') }}

    - name: Install kubernetes packages
      apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        allow_unauthenticated: no
      when: not ansible_check_mode

    - name: Hold kubernetes packages to prevent auto-update
      shell: |
        apt-mark hold kubelet kubeadm kubectl
      changed_when: false
      when: not ansible_check_mode

    - name: Verify kubernetes installation
      shell: |
        apt --installed list | grep -i kube
      register: kube_packages
      changed_when: false
      when: not ansible_check_mode

    - name: Display kubernetes packages
      debug:
        msg: "{{ kube_packages.stdout_lines | default(['Not installed in check mode']) }}"

- name: Configure Kubernetes system requirements
  block:
    - name: Disable AppArmor
      block:
        - name: Check if GRUB_CMDLINE_LINUX exists in /etc/default/grub
          shell: grep -q "^GRUB_CMDLINE_LINUX=" /etc/default/grub
          register: grub_var_exists
          changed_when: false
          ignore_errors: yes

        - name: Read current GRUB cmdline
          shell: grep "^GRUB_CMDLINE_LINUX=" /etc/default/grub | cut -d'"' -f2
          register: grub_current
          changed_when: false
          when: grub_var_exists.rc == 0

        - name: Check if apparmor=0 is already set
          shell: grep -q "apparmor=0" /etc/default/grub
          register: apparmor_check
          changed_when: false
          ignore_errors: yes
          when: grub_var_exists.rc == 0

        - name: Display GRUB status
          debug:
            msg: |
              GRUB Configuration Status:
              - GRUB_CMDLINE_LINUX exists: {{ grub_var_exists.rc == 0 }}
              {% if grub_var_exists.rc == 0 %}
              - Current value: {{ grub_current.stdout | default('empty') }}
              - apparmor=0 already set: {{ apparmor_check.rc == 0 }}
              {% else %}
              - GRUB_CMDLINE_LINUX not found (cloud VM or non-standard config)
              {% endif %}

        - name: Create GRUB_CMDLINE_LINUX if it doesn't exist
          ansible.builtin.replace:
            path: /etc/default/grub
            regexp: '^GRUB_CMDLINE_LINUX='
            replace: 'GRUB_CMDLINE_LINUX="apparmor=0 security=apparmor audit=1 audit_backlog_limit=8192"'
            backup: yes
          when: grub_var_exists.rc != 0 and not ansible_check_mode
          ignore_errors: yes

        - name: Update GRUB_CMDLINE_LINUX with AppArmor disabled
          ansible.builtin.replace:
            path: /etc/default/grub
            regexp: '^GRUB_CMDLINE_LINUX="([^"]*)"'
            replace: 'GRUB_CMDLINE_LINUX="apparmor=0 security=apparmor audit=1 audit_backlog_limit=8192"'
            backup: yes
          when: grub_var_exists.rc == 0 and apparmor_check.rc != 0 and not ansible_check_mode
          ignore_errors: yes

        - name: Update GRUB configuration
          command: update-grub
          register: grub_update
          changed_when: "'Nothing to do' not in grub_update.stdout"
          when: grub_var_exists.rc == 0 and not ansible_check_mode
          ignore_errors: yes

        - name: Display GRUB update result
          debug:
            msg: |
              GRUB Update Result:
              {% if grub_var_exists.rc == 0 %}
              - update-grub executed
              - Output: {{ grub_update.stdout | default('') | truncate(100) }}
              {% else %}
              - Skipped (GRUB_CMDLINE_LINUX not found)
              - Note: On cloud VMs (Azure, AWS), GRUB changes may require manual intervention
              {% endif %}
      when: not ansible_check_mode

    - name: Configure kubelet service for proxy
      block:
        - name: Create kubelet service directory
          file:
            path: /etc/systemd/system/kubelet.service.d
            state: directory
            mode: '0755'

        - name: Create kubelet environment config
          template:
            src: kubelet-env.conf.j2
            dest: /etc/systemd/system/kubelet.service.d/proxy.conf
            owner: root
            group: root
            mode: '0644'
          when: cluster.proxy.enabled
      when: not ansible_check_mode

    - name: Enable kubectl bash completion
      block:
        - name: Check if kubectl completion is installed
          shell: grep -q "kubectl completion bash" ~/.bashrc
          register: kubectl_completion
          changed_when: false
          ignore_errors: yes

        - name: Add kubectl completion to bashrc
          shell: echo 'source <(kubectl completion bash)' >> ~/.bashrc
          when: kubectl_completion.rc != 0
      when: not ansible_check_mode

- name: System restart required notification
  debug:
    msg: "IMPORTANT: System will be rebooted to apply GRUB changes. This will happen next in the playbook sequence."
